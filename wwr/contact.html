<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This Contact us page gets information from our clients and hep us reach them."
    />
    <meta name="author" content="Alaketu temitope" />
    <title>WWR - Contact Us</title>
    <link rel="stylesheet" href="./styles/rafting.css" />
  </head>
  <body>
    <header>
      <img src="./images/logo.png" alt="logo" width="100" />

      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="trips.html">Trips</a></li>
          <li><a class="active" href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="hero contact">
        <h1>White Water Rafting Company</h1>
        <h3>123 Main River Street</h3>
        <h3>+2348101043810</h3>
        <h3>wealthstudioofficial@gmail.com</h3>

        <div class="container">
          <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15864.724381470194!2d7.088125248193369!3d6.239847251439589!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1775507892143!5m2!1sen!2sng" width="100%" height="100%" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>

          <div class="get_contact">
            <form action="post">
              
              <div class="personal_details">
                <div>
                <label for="name">Name</label>
                <input type="text" placeholder="wealth" required>
                </div>
              
                <div>
                  <label for="email">Email</label>
                  <input type="email" placeholder="wealth@gmail.com" required>
                </div>
              </div>

              <div class="radio">
                <p>Message Purpose</p>
                <div class="radio_select" name="General_inquiry" >
                  <div>
                    <input type="radio" name="General_inquiry" id="General_inquiry"> 
                    <label for="General_inquiry">General Inquiry</label>
                  </div>
                  
                  <div>
                    <input type="radio" name="General_inquiry" id="Reservation Question"> 
                    <label for="Reservation Question">Reservation Question</label>
                  </div>                  
 
                  <div>
                    <input type="radio" name="General_inquiry" id="Website Suggestion">
                    <label for="Website Suggestion">Website Suggestion</label>
                  </div>

                </div>
              </div>

              <div class="message_purpose">
                <label for="message">Message</label>
                <textarea name="message" id="message" rows="4" placeholder="Type here..."></textarea>
              </div>

              <div class="subscribe">
                <input type="checkbox" name="subscribe" id="subscribe">
                <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
              </div>

              <button class="wide_button" type="submit">Get in Touch!</button>

            </form>
          </div>
        </div>
      </div>

      <!-- SECTION -->

      <section>
        <h2>We Are Here to serve You!</h2>
        <div class="boxes">
          <figure class="box">
          <img src="images/ceo_wealth.jpg" alt="rafting-image" width="100">
          <figcaption>CEO, WEALTH STUDIO</figcaption>
          </figure>
          <figure class="box">
          <img src="images/accountant.jpg" alt="rafting-image" width="100">
          <figcaption>ACCOUNTANT</figcaption>
          </figure>

          <figure class="box">
          <img src="images/hr_manager.jpg" alt="rafting-image" width="100">
          <figcaption>HR MANAGER</figcaption>
          </figure>

          <figure class="box">
          <img src="images/project_manager.jpg" alt="rafting-image" width="100">
          <figcaption>PROJECT MANAGER</figcaption>
          </figure>

        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 WWR. All rights reserved.</p>
      <nav class="socialmedia">
        <a href="#"><img src="images/facebook.svg" alt="face_book" /> </a>
        <a href="#"><img src="images/instagram.svg" alt="instagram" /> </a>
        <a href="#"><img src="images/whatsapp.svg" alt="whatsapp" /> </a>
      </nav>
    </footer>
    
  </body>
</html>
